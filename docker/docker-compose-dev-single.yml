networks:
  1panel-network:
    external: true

services:
  aris-api-tmpl-db-migrate-dev:
    image: ${IMAGE_REPOSITORY:-ghcr.io/hcd233/aris-api-tmpl}:${IMAGE_TAG:-master}
    container_name: aris-api-tmpl-db-migrate-dev
    restart: "no"
    networks:
      - 1panel-network
    env_file:
      - ../env/api-dev.env
    command: ["database", "migrate"]

  aris-api-tmpl-dev:
    image: ${IMAGE_REPOSITORY:-ghcr.io/hcd233/aris-api-tmpl}:${IMAGE_TAG:-master}
    container_name: aris-api-tmpl-dev
    restart: always
    networks:
      - 1panel-network
    ports:
      - "9080:8080"
    env_file:
      - ../env/api-dev.env
    volumes:
      - ../logs:/app/logs
    depends_on:
      aris-api-tmpl-db-migrate-dev:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["server", "start", "--host", "0.0.0.0", "--port", "8080"]
