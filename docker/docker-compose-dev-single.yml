version: '3'

networks:
  1panel-network:
    external: true

services:

  aris-api-tmpl-db-migrate-dev:
    image: ghcr.io/hcd233/aris-api-tmpl:master # aris-api-tmpl:latest
    container_name: aris-api-tmpl-db-migrate-dev
    restart: no
    networks:
      - 1panel-network
    env_file:
      - ../env/api-dev.env
    command: ["/app/aris-api-tmpl", "database", "migrate"]

  aris-api-tmpl-dev:
    image: ghcr.io/hcd233/aris-api-tmpl:master # aris-api-tmpl:latest
    container_name: aris-api-tmpl-dev
    restart: always
    networks:
      - 1panel-network
    ports:
      - 9080:8080
    env_file:
      - ../env/api-dev.env
    depends_on:
      aris-api-tmpl-db-migrate-dev:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://0.0.0.0:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    command: ["/app/aris-api-tmpl", "server", "start", "--host", "0.0.0.0", "--port", "8080"]

# docker compose -f docker/docker-compose-dev-single.yml up -d
