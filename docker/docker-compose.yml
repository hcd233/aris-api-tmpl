services:
  postgresql:
    image: postgres:15
    container_name: aris-api-tmpl-postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ../env/postgresql.env
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: bitnami/redis:latest
    container_name: aris-api-tmpl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    env_file:
      - ../env/redis.env
    volumes:
      - redis-data:/bitnami/redis/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: aris-api-tmpl-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ../env/minio.env
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: docker/dockerfile
    container_name: aris-api-tmpl-migrate
    restart: "no"
    env_file:
      - ../env/api.env
    environment:
      POSTGRES_HOST: postgresql
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgresql:
        condition: service_healthy
    command: ["database", "migrate"]

  api:
    build:
      context: ..
      dockerfile: docker/dockerfile
    image: ${IMAGE_REPOSITORY:-ghcr.io/hcd233/aris-api-tmpl}:${IMAGE_TAG:-local}
    container_name: aris-api-tmpl
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ../env/api.env
    environment:
      POSTGRES_HOST: postgresql
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
    volumes:
      - ../logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["server", "start", "--host", "0.0.0.0", "--port", "8080"]

volumes:
  postgresql-data:
  redis-data:
  minio-data:
